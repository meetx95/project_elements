<html>
<head>
  <title>3D Cubes</title>
</head>
<body>
  <center>    
    <div class="cube">
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
    </div>
  </center>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: 
    radial-gradient(circle at 20% 20%, #35d4ff29, transparent 24%), 
    radial-gradient(circle at 80% 10%, #7c5cff38, transparent 24%), 
    linear-gradient(135deg, #03060d, #0b1121 55%, #04070f);
  align-content: center;
}

.cube {
  width: 180px;
  height: 180px;
  right: 12%;
  bottom: 14%;
  transform-style: preserve-3d;
  animation: float 7s ease-in-out infinite;
}

.face {
  position: absolute;
  inset: 0;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 24px;
  background: linear-gradient(135deg, #7c5cff47, #35d4ff24);
  transform-style: preserve-3d;
  box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.14);
}

.face:nth-child(1) { 
  transform: rotateY(0deg) translateZ(90px);
}
.face:nth-child(2) { 
  transform: rotateY(90deg) translateZ(90px);
}
.face:nth-child(3) { 
  transform: rotateY(180deg) translateZ(90px); 
}
.face:nth-child(4) {
  transform: rotateY(270deg) translateZ(90px); 
}
.face:nth-child(5) { 
  transform: rotateX(90deg) translateZ(90px);  
}
.face:nth-child(6) { 
  transform: rotateX(-90deg) translateZ(90px); 

}
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(6deg); }
}
</style>
</body>
</html>
